<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroSim Pro - Heavy Machinery Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent: #007acc;
            --accent-hover: #005f9e;
            --node-bg: #252526;
            --node-border: #444;
            --port-color: #aaa;
            --port-hover: #fff;
            --link-color: #007acc;
            --danger: #cc3333;
            --warning: #d7ba7d;
            --success: #4caf50;
            --grid-color: rgba(255, 255, 255, 0.05);
            
            /* Telemetry Colors */
            --tel-pwr: #ff4444;
            --tel-trq: #ffcc00;
            --tel-vol: #44aaff;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --border-color: #ccc;
            --text-main: #333333;
            --text-muted: #666;
            --accent: #005f9e;
            --accent-hover: #007acc;
            --node-bg: #ffffff;
            --node-border: #bbb;
            --port-color: #666;
            --port-hover: #000;
            --link-color: #005f9e;
            --grid-color: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        
        /* Header */
        header { height: 50px; background-color: var(--panel-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 10; flex-shrink: 0; }
        .header-title { font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .header-stats { font-family: monospace; font-size: 1.1rem; color: var(--warning); background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border-color); }
        .toolbar { display: flex; gap: 10px; }
        button { background-color: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
        button:hover { background-color: var(--accent-hover); }
        button.danger { background-color: var(--danger); }
        
        /* Main Layout */
        .main-container { display: flex; flex: 1; height: calc(100vh - 200px); overflow: hidden; }
        
        /* Sidebars */
        .sidebar { width: 260px; background-color: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 5; }
        .sidebar.right { border-right: none; border-left: 1px solid var(--border-color); }
        .sidebar-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border-color); background-color: rgba(0,0,0,0.1); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Palette Items */
        .palette-item { background-color: var(--node-bg); border: 1px solid var(--node-border); padding: 10px; margin-bottom: 10px; border-radius: 6px; cursor: grab; user-select: none; transition: border-color 0.2s; }
        .palette-item:hover { border-color: var(--accent); }
        .palette-item-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 4px; }
        .palette-item-desc { font-size: 0.75rem; color: var(--text-muted); }

        /* Canvas & World */
        .canvas-container { flex: 1; position: relative; overflow: hidden; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 20px 20px; cursor: grab; }
        .canvas-container:active { cursor: grabbing; }
        #world { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; pointer-events: none; }
        #world > * { pointer-events: auto; }
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 1; }
        
        /* Links */
        .link-path { fill: none; stroke: var(--link-color); stroke-width: 6; stroke-linecap: round; transition: stroke 0.3s; pointer-events: stroke; cursor: pointer; }
        .link-path:hover { stroke-width: 8; }
        .link-anim { fill: none; stroke: rgba(255,255,255,0.6); stroke-width: 3; stroke-dasharray: 12, 12; pointer-events: none; }
        [data-theme="light"] .link-anim { stroke: rgba(0,0,0,0.4); }
        .link-label { font-size: 12px; font-weight: bold; fill: var(--text-main); pointer-events: none; text-anchor: middle; dominant-baseline: middle; text-shadow: 0px 0px 4px var(--bg-color), 0px 0px 4px var(--bg-color), 0px 0px 4px var(--bg-color); }

        /* Nodes */
        .node { position: absolute; background-color: var(--node-bg); border: 1px solid var(--node-border); border-radius: 8px; width: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 2; user-select: none; display: flex; flex-direction: column; cursor: default; }
        .node.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
        .node-header { padding: 8px; background-color: rgba(0,0,0,0.2); border-bottom: 1px solid var(--node-border); font-size: 0.85rem; font-weight: bold; cursor: grab; border-radius: 8px 8px 0 0; text-align: center; }
        .node-header:active { cursor: grabbing; }
        .node-body { padding: 10px; font-size: 0.75rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 6px; }
        .node-stat { display: flex; justify-content: space-between; align-items: center; }
        .node-stat span:last-child { color: var(--text-main); font-family: monospace; font-weight: bold; }
        
        /* Ports */
        .port { position: absolute; width: 14px; height: 14px; background-color: var(--port-color); border: 2px solid var(--node-bg); border-radius: 50%; cursor: crosshair; z-index: 3; transform: translate(-50%, -50%); transition: transform 0.2s, background-color 0.2s; }
        .port:hover { transform: translate(-50%, -50%) scale(1.5); background-color: var(--port-hover); }
        .port-label { position: absolute; font-size: 0.65rem; color: var(--text-main); pointer-events: none; font-weight: bold; }

        /* Interactive Elements & Animations */
        .valve-slider { width: 100%; cursor: pointer; accent-color: var(--accent); margin-top: 4px; }
        .cylinder-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; position: relative; border: 1px solid var(--border-color); }
        .cylinder-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }
        .status-badge { text-align: center; font-weight: bold; padding: 4px; border-radius: 4px; color: white; margin-bottom: 4px; }
        .status-idle { background-color: var(--border-color); }
        .status-active { background-color: var(--success); animation: pulse 1s infinite; }
        .status-danger { background-color: var(--danger); }

        .anim-gear { font-size: 1.8rem; text-align: center; animation: spin linear infinite; margin: 2px 0; display: inline-block; width: 100%; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Properties Panel */
        .prop-group { margin-bottom: 15px; }
        .prop-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-muted); }
        .prop-group input { width: 100%; padding: 6px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; }
        .empty-props { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: 20px; }

        /* Telemetry Dashboard */
        .telemetry-panel { height: 150px; background-color: var(--panel-bg); border-top: 1px solid var(--border-color); display: flex; padding: 10px 20px; gap: 20px; z-index: 10; flex-shrink: 0; }
        .telemetry-legend { display: flex; flex-direction: column; justify-content: center; gap: 10px; font-size: 0.85rem; min-width: 180px; }
        .legend-item { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border-color); }
        .legend-left { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 14px; height: 14px; border-radius: 3px; }
        .legend-val { font-family: monospace; font-weight: bold; color: var(--text-main); }
        #telemetry-canvas { flex: 1; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; }
    </style>
</head>
<body data-theme="dark">

    <header>
        <div class="header-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            HydroSim Pro <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: normal;">Heavy Machinery Edition</span>
        </div>
        <div class="header-stats" id="sys-temp">System Temp: 20.0 °C</div>
        <div class="toolbar">
            <button id="btn-toggle-sim">Start Simulation</button>
            <button id="btn-export">Export JSON</button>
            <button id="btn-import">Import JSON</button>
            <input type="file" id="file-import" style="display:none" accept=".json">
            <button id="btn-theme">Toggle Theme</button>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-header">Components</div>
            <div class="sidebar-content" id="palette"></div>
        </div>

        <div class="canvas-container" id="canvas">
            <div id="world">
                <svg id="svg-layer"></svg>
                <!-- Nodes injected here -->
            </div>
        </div>

        <div class="sidebar right">
            <div class="sidebar-header">Properties</div>
            <div class="sidebar-content" id="properties-panel">
                <div class="empty-props">Select a node or link to edit properties.</div>
            </div>
        </div>
    </div>

    <!-- Telemetry Dashboard -->
    <div class="telemetry-panel">
        <div class="telemetry-legend">
            <div class="legend-item">
                <div class="legend-left"><div class="legend-color" style="background: var(--tel-pwr)"></div> Power</div>
                <div class="legend-val" id="leg-pwr">0.0 kW</div>
            </div>
            <div class="legend-item">
                <div class="legend-left"><div class="legend-color" style="background: var(--tel-trq)"></div> Torque</div>
                <div class="legend-val" id="leg-trq">0 Nm</div>
            </div>
            <div class="legend-item">
                <div class="legend-left"><div class="legend-color" style="background: var(--tel-vol)"></div> Tank Vol</div>
                <div class="legend-val" id="leg-vol">0.0 L</div>
            </div>
        </div>
        <canvas id="telemetry-canvas"></canvas>
    </div>

<script>
/**
 * HYDROSIM PRO - Heavy Machinery Edition
 * Strict KCL Nodal Analysis, Proper Pump Suction, & Real-Time Telemetry
 */

const generateId = () => Math.random().toString(36).substr(2, 9);
const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

// --- COMPONENT DEFINITIONS ---
const COMPONENT_TYPES = {
    fuelTank: {
        name: "Fuel Tank", desc: "Stores combustible fuel.",
        ports: [{ id: 'OUT', label: 'Out', x: 0.5, y: 1 }],
        params: { capacity: 1000, level: 1000 }, state: {},
        applyPhysics: (node, portsMap) => {
            let pOut = portsMap[node.id + '_OUT'];
            pOut.isFixed = true;
            pOut.pressure = node.params.level > 0 ? 100 : 0; 
        },
        renderUI: (node) => `
            <div class="cylinder-bar"><div class="cylinder-fill" style="width: ${(node.params.level/node.params.capacity)*100}%"></div></div>
            <div class="node-stat"><span>Fuel:</span><span>${node.params.level.toFixed(1)} L</span></div>
        `
    },
    engine: {
        name: "Thermic Engine", desc: "Consumes fuel, outputs RPM.",
        ports: [{ id: 'M', label: 'Mech', x: 1, y: 0.5 }, { id: 'F', label: 'Fuel', x: 0, y: 0.5 }],
        params: { fuelRate: 55, efficiency: 1.0 }, state: { rpm: 0 }, // 55 * 40 = 2200 RPM
        applyPhysics: (node, portsMap) => {
            let pF = portsMap[node.id + '_F'], pM = portsMap[node.id + '_M'];
            let running = pF.pressure > 10; 
            
            if (running) {
                pF.sum_Q -= node.params.fuelRate; 
                node.state.rpm = node.params.fuelRate * node.params.efficiency * 40;
            } else {
                node.state.rpm = 0;
            }
            pM.isFixed = true;
            pM.pressure = node.state.rpm;
        },
        renderUI: (node) => {
            let rpm = Math.abs(node.state.rpm);
            let duration = rpm > 0 ? Math.max(0.1, 60 / rpm) : 0;
            return `
                <div class="anim-gear" style="animation-duration: ${duration}s; animation-play-state: ${rpm > 0 ? 'running' : 'paused'}">⚙️</div>
                <div class="node-stat"><span>Status:</span><span style="color:${rpm > 0 ? 'var(--success)' : 'var(--danger)'}">${rpm > 0 ? 'RUNNING' : 'NO FUEL'}</span></div>
                <div class="node-stat"><span>Output:</span><span class="stat-rpm">${Math.round(rpm)} RPM</span></div>
            `;
        }
    },
    tank: {
        name: "Hydraulic Reservoir", desc: "0-bar reference & fluid storage.",
        ports: [{ id: 'T', label: 'T', x: 0.5, y: 0 }],
        params: { capacity: 2000, level: 1000 }, state: {},
        applyPhysics: (node, portsMap) => {
            portsMap[node.id + '_T'].isFixed = true;
            portsMap[node.id + '_T'].pressure = 0;
        },
        renderUI: (node) => `
            <div class="cylinder-bar"><div class="cylinder-fill" style="width: ${(node.params.level/node.params.capacity)*100}%"></div></div>
            <div class="node-stat"><span>Level:</span><span>${node.params.level.toFixed(1)} L</span></div>
            <button style="width:100%; margin-top:5px; padding:4px; font-size:0.75rem;" onmousedown="event.stopPropagation()" onclick="window.refillTank('${node.id}')">Refill +50L</button>
        `
    },
    pump: {
        name: "Hydraulic Pump", desc: "Draws from IN, pushes to OUT.",
        ports: [{ id: 'M', label: 'M', x: 0, y: 0.2 }, { id: 'IN', label: 'In', x: 0, y: 0.8 }, { id: 'OUT', label: 'Out', x: 1, y: 0.5 }],
        params: { displacement: 130 }, state: { flow: 0 },
        applyPhysics: (node, portsMap) => {
            let pM = portsMap[node.id + '_M'], pIn = portsMap[node.id + '_IN'], pOut = portsMap[node.id + '_OUT'];
            let rpm = pM.pressure;
            let idealFlow = (rpm * node.params.displacement) / 1000; 
            
            // Strict KCL Cavitation Logic: Pump cannot pull infinite vacuum.
            // If pIn drops towards -1 bar, actual flow drops to 0.
            let availableFactor = clamp(pIn.pressure + 1, 0, 1);
            let actualFlow = idealFlow * availableFactor;
            node.state.flow = actualFlow;
            
            pIn.sum_Q -= actualFlow; 
            pOut.sum_Q += actualFlow;
            
            let G_slip = 0.05 * appState.viscosityMult;
            addConductance(pIn, pOut, G_slip);
        },
        renderUI: (node) => {
            let rpm = Math.abs(node._lastP?.M || 0);
            let duration = rpm > 0 ? Math.max(0.1, 60 / rpm) : 0;
            return `
                <div class="anim-gear" style="animation-duration: ${duration}s; animation-play-state: ${rpm > 0 ? 'running' : 'paused'}">⚙️</div>
                <div class="node-stat"><span>Flow:</span><span>${node.state.flow.toFixed(1)} L/min</span></div>
                <div class="node-stat"><span>Max P:</span><span class="stat-maxp">0 bar</span></div>
            `;
        }
    },
    motor: {
        name: "Hydraulic Motor", desc: "Converts Flow to RPM.",
        ports: [{ id: 'IN', label: 'In', x: 0, y: 0.2 }, { id: 'OUT', label: 'Out', x: 0, y: 0.8 }, { id: 'M', label: 'M', x: 1, y: 0.5 }],
        params: { displacement: 130, loadResistance: 10 }, state: { rpm: 0 },
        applyPhysics: (node, portsMap) => {
            let pIn = portsMap[node.id + '_IN'], pOut = portsMap[node.id + '_OUT'], pM = portsMap[node.id + '_M'];
            let G_load = 100 / node.params.loadResistance;
            addConductance(pIn, pOut, G_load);
            let flow = (pIn.pressure - pOut.pressure) * G_load;
            node.state.rpm = (flow * 1000) / node.params.displacement;
            pM.isFixed = true; pM.pressure = Math.max(0, node.state.rpm);
        },
        renderUI: (node) => {
            let rpm = Math.abs(node.state.rpm);
            let duration = rpm > 0 ? Math.max(0.1, 60 / rpm) : 0;
            return `
                <div class="anim-gear" style="animation-duration: ${duration}s; animation-play-state: ${rpm > 0 ? 'running' : 'paused'}; animation-direction: ${node.state.rpm < 0 ? 'reverse' : 'normal'}">⚙️</div>
                <div class="node-stat"><span>Speed:</span><span class="stat-rpm">0 RPM</span></div>
            `;
        }
    },
    rotaryHead: {
        name: "Rotary Head", desc: "Heavy mechanical load.",
        ports: [{ id: 'IN', label: 'In', x: 0, y: 0.2 }, { id: 'OUT', label: 'Out', x: 0, y: 0.8 }, { id: 'D', label: 'Dr', x: 0.5, y: 1 }],
        params: { displacement: 1000, reqTorque: 3000 }, state: { rpm: 0 },
        applyPhysics: (node, portsMap) => {
            let pIn = portsMap[node.id + '_IN'], pOut = portsMap[node.id + '_OUT'], pD = portsMap[node.id + '_D'];
            let P_req = (node.params.reqTorque * 20 * Math.PI) / node.params.displacement; 
            let dP = pIn.pressure - pOut.pressure;
            
            let G_base = 20; 
            let G_eq = 0.001; 
            
            if (dP > P_req) G_eq = G_base * (1 - (P_req / dP));
            
            addConductance(pIn, pOut, G_eq);
            addConductance(pIn, pD, 0.05 * appState.viscosityMult); 
            
            let flow = dP * G_eq;
            node.state.rpm = (flow * 1000) / node.params.displacement;
        },
        renderUI: (node) => {
            let rpm = Math.abs(node.state.rpm);
            let duration = rpm > 0 ? Math.max(0.1, 60 / rpm) : 0;
            return `
                <div class="anim-gear" style="animation-duration: ${duration}s; animation-play-state: ${rpm > 0 ? 'running' : 'paused'}">⚙️</div>
                <div class="node-stat"><span>Load:</span><span>${node.params.reqTorque} Nm</span></div>
                <div class="node-stat"><span>Speed:</span><span class="stat-rpm">0 RPM</span></div>
            `;
        }
    },
    drifter: {
        name: "Percussion Drifter", desc: "Impacts at high pressure.",
        ports: [{ id: 'P', label: 'P', x: 0, y: 0.2 }, { id: 'T', label: 'T', x: 0, y: 0.8 }],
        params: { opPressure: 207 }, state: { hz: 0, impacting: false },
        applyPhysics: (node, portsMap) => {
            let pP = portsMap[node.id + '_P'], pT = portsMap[node.id + '_T'];
            let dP = pP.pressure - pT.pressure;
            let G_base = 30;
            let G_eq = 0.001;
            
            if (dP > node.params.opPressure) {
                G_eq = G_base * (1 - (node.params.opPressure / dP));
                node.state.impacting = true;
            } else {
                node.state.impacting = false;
            }
            addConductance(pP, pT, G_eq);
            node.state.hz = (dP * G_eq) * 0.8; 
        },
        renderUI: () => `
            <div class="status-badge stat-drifter-status status-idle">IDLE</div>
            <div class="node-stat"><span>Freq:</span><span class="stat-hz">0 Hz</span></div>
        `
    },
    valve43: {
        name: "Proportional Valve", desc: "4/3-way spool valve.",
        ports: [{ id: 'P', label: 'P', x: 0.2, y: 1 }, { id: 'T', label: 'T', x: 0.8, y: 1 }, { id: 'A', label: 'A', x: 0.2, y: 0 }, { id: 'B', label: 'B', x: 0.8, y: 0 }],
        params: {}, state: { slider: 0 },
        applyPhysics: (node, portsMap) => {
            let pP = portsMap[node.id + '_P'], pT = portsMap[node.id + '_T'], pA = portsMap[node.id + '_A'], pB = portsMap[node.id + '_B'];
            let x = node.state.slider / 100; 
            let G_max = 200, G_leak = 0.001;
            let G_PA = G_leak, G_BT = G_leak, G_PB = G_leak, G_AT = G_leak;
            
            if (x > 0) { G_PA = G_leak + G_max * (x * x); G_BT = G_leak + G_max * (x * x); }
            else if (x < 0) { G_PB = G_leak + G_max * (x * x); G_AT = G_leak + G_max * (x * x); }
            
            addConductance(pP, pA, G_PA); addConductance(pB, pT, G_BT);
            addConductance(pP, pB, G_PB); addConductance(pA, pT, G_AT);
        },
        renderUI: (node) => `
            <input type="range" min="-100" max="100" value="${node.state.slider}" class="valve-slider" oninput="window.updateValve('${node.id}', this.value)">
            <div class="node-stat"><span>Spool:</span><span class="stat-spool">${node.state.slider}%</span></div>
        `
    },
    cylinder: {
        name: "Hydraulic Cylinder", desc: "Double-acting actuator.",
        ports: [{ id: 'A', label: 'A', x: 0, y: 0.2 }, { id: 'B', label: 'B', x: 0, y: 0.8 }],
        params: { volume: 20 }, state: { stroke: 0 },
        applyPhysics: (node, portsMap, dt) => {
            let pA = portsMap[node.id + '_A'], pB = portsMap[node.id + '_B'];
            let G = 40;
            if (node.state.stroke <= 0 && pA.pressure < pB.pressure) G = 0.001;
            if (node.state.stroke >= 100 && pA.pressure > pB.pressure) G = 0.001;
            addConductance(pA, pB, G);
            
            let flow = (pA.pressure - pB.pressure) * G;
            node.state.stroke += ((flow / 60) / node.params.volume) * 100 * dt;
            node.state.stroke = clamp(node.state.stroke, 0, 100);
        },
        renderUI: () => `
            <div class="cylinder-bar"><div class="cylinder-fill stat-cyl-fill" style="width: 0%"></div></div>
            <div class="node-stat"><span>Pos:</span><span class="stat-pos">0.0%</span></div>
        `
    },
    prv: {
        name: "Relief Valve", desc: "Caps max pressure.",
        ports: [{ id: 'P', label: 'P', x: 0, y: 0.5 }, { id: 'T', label: 'T', x: 1, y: 0.5 }],
        params: { crackPressure: 250 }, state: {},
        applyPhysics: (node, portsMap) => {
            let pP = portsMap[node.id + '_P'], pT = portsMap[node.id + '_T'];
            let diff = pP.pressure - pT.pressure;
            let G = 0.001;
            if (diff > node.params.crackPressure) G = (diff - node.params.crackPressure) * 10;
            addConductance(pP, pT, G);
        },
        renderUI: (node) => `<div class="node-stat"><span>Set:</span><span>${node.params.crackPressure} bar</span></div>`
    },
    pilotCheck: {
        name: "Pilot Check Valve", desc: "Blocks reverse flow unless piloted.",
        ports: [{ id: 'A', label: 'A', x: 0, y: 0.5 }, { id: 'B', label: 'B', x: 1, y: 0.5 }, { id: 'X', label: 'X', x: 0.5, y: 1 }],
        params: { pilotRatio: 3 }, state: {},
        applyPhysics: (node, portsMap) => {
            let pA = portsMap[node.id + '_A'], pB = portsMap[node.id + '_B'], pX = portsMap[node.id + '_X'];
            let G = 0.001;
            if (pA.pressure > pB.pressure || pX.pressure > (pB.pressure / node.params.pilotRatio)) G = 200;
            addConductance(pA, pB, G);
        },
        renderUI: () => `<div class="node-stat"><span>Max P:</span><span class="stat-maxp">0 bar</span></div>`
    },
    flowDivider: {
        name: "Flow Divider", desc: "Splits flow by ratio.",
        ports: [{ id: 'IN', label: 'In', x: 0, y: 0.5 }, { id: 'A', label: 'A', x: 1, y: 0.2 }, { id: 'B', label: 'B', x: 1, y: 0.8 }],
        params: { ratioA: 50 }, state: { gA: 10, gB: 10 },
        applyPhysics: (node, portsMap) => {
            let pIn = portsMap[node.id + '_IN'], pA = portsMap[node.id + '_A'], pB = portsMap[node.id + '_B'];
            let qA = (pIn.pressure - pA.pressure) * node.state.gA;
            let qB = (pIn.pressure - pB.pressure) * node.state.gB;
            let targetRatio = node.params.ratioA / (100 - node.params.ratioA);
            let currentRatio = qB === 0 ? targetRatio : qA / qB;
            
            if (currentRatio < targetRatio) { node.state.gA += 1.0; node.state.gB -= 1.0; }
            else { node.state.gA -= 1.0; node.state.gB += 1.0; }
            
            node.state.gA = clamp(node.state.gA, 0.1, 200); node.state.gB = clamp(node.state.gB, 0.1, 200);
            addConductance(pIn, pA, node.state.gA); addConductance(pIn, pB, node.state.gB);
        },
        renderUI: (node) => `<div class="node-stat"><span>Ratio A:</span><span>${node.params.ratioA}%</span></div>`
    },
    filter: {
        name: "Hydraulic Filter", desc: "Cleans fluid, can clog.",
        ports: [{ id: 'IN', label: 'In', x: 0, y: 0.5 }, { id: 'OUT', label: 'Out', x: 1, y: 0.5 }],
        params: { maxVolume: 5000 }, state: { volumePassed: 0, clogged: false },
        applyPhysics: (node, portsMap, dt) => {
            let pIn = portsMap[node.id + '_IN'], pOut = portsMap[node.id + '_OUT'];
            let G = node.state.clogged ? 2 : 100;
            addConductance(pIn, pOut, G);
            let flow = Math.abs((pIn.pressure - pOut.pressure) * G);
            node.state.volumePassed += (flow / 60) * dt;
            if (node.state.volumePassed > node.params.maxVolume) node.state.clogged = true;
        },
        renderUI: () => `<div class="status-badge stat-filter-status status-idle">CLEAN</div>`
    },
    cooler: {
        name: "Heat Exchanger", desc: "Removes heat from fluid.",
        ports: [{ id: 'IN', label: 'In', x: 0, y: 0.5 }, { id: 'OUT', label: 'Out', x: 1, y: 0.5 }],
        params: { efficiency: 0.5 }, state: { coolingKw: 0 },
        applyPhysics: (node, portsMap) => {
            let pIn = portsMap[node.id + '_IN'], pOut = portsMap[node.id + '_OUT'];
            let G = 80;
            addConductance(pIn, pOut, G);
            let flow = Math.abs((pIn.pressure - pOut.pressure) * G);
            node.state.coolingKw = flow * node.params.efficiency * 0.1;
        },
        renderUI: () => `<div class="node-stat"><span>Cooling:</span><span class="stat-cooling">0.0 kW</span></div>`
    }
};

// --- STATE MANAGEMENT ---
let appState = {
    nodes: [], links: [],
    simRunning: false,
    globalTemp: 20.0,
    viscosityMult: 1.0
};

let telemetry = { power: [], torque: [], volume: [], maxLen: 300 };

let camera = { x: 0, y: 0, zoom: 1 };
let isPanning = false;
let panStart = { x: 0, y: 0 };

let selection = { type: null, id: null };
let dragState = { isDragging: false, node: null, offsetX: 0, offsetY: 0 };
let linkState = { isLinking: false, sourceNode: null, sourcePort: null, tempX: 0, tempY: 0 };

let physicsPorts = {}; 
let frameConductances = [];
const domNodes = new Map();

// --- INITIALIZATION ---
function init() {
    buildPalette();
    setupEventListeners();
    requestAnimationFrame(mainLoop);
}

function buildPalette() {
    const palette = document.getElementById('palette');
    for (const [type, def] of Object.entries(COMPONENT_TYPES)) {
        const el = document.createElement('div');
        el.className = 'palette-item';
        el.innerHTML = `<div class="palette-item-title">${def.name}</div><div class="palette-item-desc">${def.desc}</div>`;
        el.draggable = true;
        el.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', type));
        palette.appendChild(el);
    }
}

// --- PHYSICS ENGINE ---
let lastTime = performance.now();

function addConductance(p1, p2, G) {
    p1.connections.push({ other: p2, G: G });
    p2.connections.push({ other: p1, G: G });
    frameConductances.push({ p1, p2, G });
}

function stepPhysics(dt) {
    if (!appState.simRunning) return;
    
    appState.viscosityMult = Math.exp(0.03 * (appState.globalTemp - 20));
    frameConductances = [];

    // 1. Initialize Ports
    physicsPorts = {};
    appState.nodes.forEach(n => {
        COMPONENT_TYPES[n.type].ports.forEach(p => {
            let pid = n.id + '_' + p.id;
            physicsPorts[pid] = { 
                pressure: n._lastP?.[p.id] || 0, 
                prevPressure: n._lastP?.[p.id] || 0,
                sum_Q: 0, connections: [], isFixed: false 
            };
        });
    });

    // 2. Apply Link Conductances
    appState.links.forEach(l => {
        let p1 = physicsPorts[l.sourceNode + '_' + l.sourcePort];
        let p2 = physicsPorts[l.targetNode + '_' + l.targetPort];
        if (p1 && p2) {
            let G = (Math.pow(l.params.diameter, 4) / (l.params.length || 1)) / appState.viscosityMult;
            addConductance(p1, p2, G);
            l._G = G;
        }
    });

    // 3. Apply Component Physics
    appState.nodes.forEach(n => {
        let def = COMPONENT_TYPES[n.type];
        if (def.applyPhysics) def.applyPhysics(n, physicsPorts, dt);
    });

    // 4. Gauss-Seidel Iteration (Strict KCL with Capacitance)
    const portArray = Object.values(physicsPorts);
    const C_eff = 0.05; // Increased capacitance for heavy machinery stability
    const dt_safe = Math.max(dt, 0.001);
    const C_dt = C_eff / dt_safe;

    for (let iter = 0; iter < 40; iter++) {
        for (let i = 0; i < portArray.length; i++) {
            let p = portArray[i];
            if (p.isFixed) continue;
            let sum_GP = 0, sum_G = 0;
            for (let j = 0; j < p.connections.length; j++) {
                sum_GP += p.connections[j].G * p.connections[j].other.pressure;
                sum_G += p.connections[j].G;
            }
            let newP = (C_dt * p.prevPressure + sum_GP + p.sum_Q) / (C_dt + sum_G);
            p.pressure = p.pressure * 0.8 + newP * 0.2; 
            
            // Allow vacuum mathematically, but cap at absolute zero (-1 bar gauge) to prevent math explosions
            if (p.pressure < -1) p.pressure = -1; 
        }
    }

    // 5. Thermodynamics
    let heatW = 0;
    frameConductances.forEach(c => {
        let dp = c.p1.pressure - c.p2.pressure;
        let q = dp * c.G;
        heatW += Math.abs(dp * q) * 1.667; 
    });

    appState.nodes.forEach(n => {
        if (n.type === 'cooler') heatW -= n.state.coolingKw * 1000;
        n._lastP = {};
        COMPONENT_TYPES[n.type].ports.forEach(p => {
            n._lastP[p.id] = physicsPorts[n.id + '_' + p.id].pressure;
        });
    });

    appState.globalTemp += (heatW / 20000) * dt;
    appState.globalTemp -= (appState.globalTemp - 20) * 0.05 * dt; 
    appState.globalTemp = Math.max(20, appState.globalTemp);

    // 6. Calculate Link Flows
    appState.links.forEach(l => {
        let p1 = physicsPorts[l.sourceNode + '_' + l.sourcePort];
        let p2 = physicsPorts[l.targetNode + '_' + l.targetPort];
        if (p1 && p2) l._flow = (p1.pressure - p2.pressure) * l._G;
    });

    // 7. Update Tanks (Fuel & Hydraulic)
    appState.nodes.forEach(n => {
        if (n.type === 'fuelTank') {
            let outFlow = 0;
            appState.links.forEach(l => {
                if (l.sourceNode === n.id && l.sourcePort === 'OUT') outFlow += l._flow;
                if (l.targetNode === n.id && l.targetPort === 'OUT') outFlow -= l._flow;
            });
            if (outFlow > 0) {
                n.params.level -= (outFlow / 60) * dt;
                if (n.params.level < 0) n.params.level = 0;
            }
        }
        if (n.type === 'tank') {
            let netFlow = 0;
            appState.links.forEach(l => {
                if (l.targetNode === n.id && l.targetPort === 'T') netFlow += l._flow;
                if (l.sourceNode === n.id && l.sourcePort === 'T') netFlow -= l._flow;
            });
            n.params.level += (netFlow / 60) * dt;
            n.params.level = clamp(n.params.level, 0, n.params.capacity);
        }
    });

    updateTelemetry();
}

function updateTelemetry() {
    if (!appState.simRunning) return;

    let pwr = 0, trq = 0, vol = 0;
    
    let tank = appState.nodes.find(n => n.type === 'tank');
    if (tank) vol = tank.params.level;

    appState.nodes.forEach(n => {
        if (n.type === 'rotaryHead') {
            let pIn = physicsPorts[n.id + '_IN'];
            let pOut = physicsPorts[n.id + '_OUT'];
            if (pIn && pOut) {
                let dP = Math.max(0, pIn.pressure - pOut.pressure);
                trq = (dP * n.params.displacement) / (20 * Math.PI);
                let flow = 0;
                appState.links.forEach(l => {
                    if (l.targetNode === n.id && l.targetPort === 'IN') flow += l._flow;
                    if (l.sourceNode === n.id && l.sourcePort === 'IN') flow -= l._flow;
                });
                pwr += (dP * Math.abs(flow)) / 600;
            }
        }
        if (n.type === 'drifter') {
            let pP = physicsPorts[n.id + '_P'];
            let pT = physicsPorts[n.id + '_T'];
            if (pP && pT) {
                let dP = Math.max(0, pP.pressure - pT.pressure);
                let flow = 0;
                appState.links.forEach(l => {
                    if (l.targetNode === n.id && l.targetPort === 'P') flow += l._flow;
                    if (l.sourceNode === n.id && l.sourcePort === 'P') flow -= l._flow;
                });
                pwr += (dP * Math.abs(flow)) / 600;
            }
        }
    });

    telemetry.power.push(pwr);
    telemetry.torque.push(trq);
    telemetry.volume.push(vol);

    if (telemetry.power.length > telemetry.maxLen) {
        telemetry.power.shift();
        telemetry.torque.shift();
        telemetry.volume.shift();
    }
}

function drawTelemetry() {
    const canvas = document.getElementById('telemetry-canvas');
    const ctx = canvas.getContext('2d');
    
    if (canvas.width !== canvas.clientWidth) canvas.width = canvas.clientWidth;
    if (canvas.height !== canvas.clientHeight) canvas.height = canvas.clientHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const drawLine = (data, color, maxVal) => {
        if (data.length === 0 || maxVal === 0) return;
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        let step = canvas.width / telemetry.maxLen;
        for (let i = 0; i < data.length; i++) {
            let x = i * step;
            let y = canvas.height - (data[i] / maxVal) * canvas.height * 0.85 - 10; 
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    };

    let maxPwr = Math.max(100, ...telemetry.power) * 1.2;
    let maxTrq = Math.max(1000, ...telemetry.torque) * 1.2;
    let maxVol = Math.max(100, ...telemetry.volume) * 1.2;

    drawLine(telemetry.power, 'var(--tel-pwr)', maxPwr);
    drawLine(telemetry.torque, 'var(--tel-trq)', maxTrq);
    drawLine(telemetry.volume, 'var(--tel-vol)', maxVol);

    document.getElementById('leg-pwr').innerText = (telemetry.power[telemetry.power.length-1] || 0).toFixed(1) + ' kW';
    document.getElementById('leg-trq').innerText = (telemetry.torque[telemetry.torque.length-1] || 0).toFixed(0) + ' Nm';
    document.getElementById('leg-vol').innerText = (telemetry.volume[telemetry.volume.length-1] || 0).toFixed(1) + ' L';
}

// --- RENDERER ---
function render() {
    const world = document.getElementById('world');
    const svgLayer = document.getElementById('svg-layer');

    document.getElementById('sys-temp').innerText = `System Temp: ${appState.globalTemp.toFixed(1)} °C`;

    // Render Nodes
    appState.nodes.forEach(node => {
        let el = domNodes.get(node.id);
        if (!el) {
            el = document.createElement('div');
            el.className = 'node';
            el.id = 'node-' + node.id;
            
            let header = document.createElement('div');
            header.className = 'node-header';
            header.innerText = COMPONENT_TYPES[node.type].name;
            header.addEventListener('mousedown', (e) => startDrag(e, node));
            el.appendChild(header);

            let body = document.createElement('div');
            body.className = 'node-body';
            body.innerHTML = COMPONENT_TYPES[node.type].renderUI(node);
            el.appendChild(body);

            COMPONENT_TYPES[node.type].ports.forEach(p => {
                let portEl = document.createElement('div');
                portEl.className = 'port';
                portEl.style.left = (p.x * 100) + '%'; portEl.style.top = (p.y * 100) + '%';
                portEl.title = p.label;
                
                let labelEl = document.createElement('div');
                labelEl.className = 'port-label'; labelEl.innerText = p.label;
                if (p.x <= 0.1) { labelEl.style.left = '18px'; labelEl.style.top = '-5px'; }
                else if (p.x >= 0.9) { labelEl.style.right = '18px'; labelEl.style.top = '-5px'; }
                else if (p.y <= 0.1) { labelEl.style.top = '18px'; labelEl.style.left = '-5px'; }
                else { labelEl.style.bottom = '18px'; labelEl.style.left = '-5px'; }
                portEl.appendChild(labelEl);

                portEl.addEventListener('mousedown', (e) => { e.stopPropagation(); startLink(node.id, p.id, e); });
                portEl.addEventListener('mouseup', (e) => { e.stopPropagation(); finishLink(node.id, p.id); });
                el.appendChild(portEl);
            });

            el.addEventListener('mousedown', (e) => { e.stopPropagation(); selectItem('node', node.id); });
            world.appendChild(el);
            domNodes.set(node.id, el);
        }

        el.style.left = node.x + 'px'; el.style.top = node.y + 'px';
        el.classList.toggle('selected', selection.type === 'node' && selection.id === node.id);

        // Update Dynamic UI Elements
        let maxP = node._lastP ? Math.max(...Object.values(node._lastP)) : 0;
        
        if (node.type === 'cylinder') {
            el.querySelector('.stat-cyl-fill').style.width = node.state.stroke + '%';
            el.querySelector('.stat-pos').innerText = node.state.stroke.toFixed(1) + '%';
        } else if (node.type === 'valve43') {
            el.querySelector('.stat-spool').innerText = node.state.slider + '%';
        } else if (node.type === 'motor' || node.type === 'engine' || node.type === 'rotaryHead') {
            let rpmEl = el.querySelector('.stat-rpm');
            if(rpmEl) rpmEl.innerText = Math.round(node.state.rpm || (node.type==='engine'?node._lastP?.M:0)) + ' RPM';
        } else if (node.type === 'drifter') {
            let badge = el.querySelector('.stat-drifter-status');
            badge.className = `status-badge stat-drifter-status ${node.state.impacting ? 'status-active' : 'status-idle'}`;
            badge.innerText = node.state.impacting ? 'IMPACTING' : 'IDLE';
            el.querySelector('.stat-hz').innerText = Math.round(node.state.hz) + ' Hz';
        } else if (node.type === 'filter') {
            let badge = el.querySelector('.stat-filter-status');
            badge.className = `status-badge stat-filter-status ${node.state.clogged ? 'status-danger' : 'status-idle'}`;
            badge.innerText = node.state.clogged ? 'CLOGGED' : 'CLEAN';
        } else if (node.type === 'cooler') {
            el.querySelector('.stat-cooling').innerText = node.state.coolingKw.toFixed(1) + ' kW';
        } else if (node.type === 'tank' || node.type === 'fuelTank') {
            el.querySelector('.cylinder-fill').style.width = (node.params.level/node.params.capacity)*100 + '%';
            el.querySelector('.node-stat span:last-child').innerText = node.params.level.toFixed(1) + ' L';
        }

        let maxpEl = el.querySelector('.stat-maxp');
        if(maxpEl) maxpEl.innerText = maxP.toFixed(1) + ' bar';

        // Update animations
        let gear = el.querySelector('.anim-gear');
        if (gear && node.state.rpm !== undefined) {
            let rpm = Math.abs(node.state.rpm);
            gear.style.animationDuration = rpm > 0 ? Math.max(0.1, 60 / rpm) + 's' : '0s';
            gear.style.animationPlayState = rpm > 0 ? 'running' : 'paused';
        }
    });

    for (let [id, el] of domNodes) {
        if (!appState.nodes.find(n => n.id === id)) { el.remove(); domNodes.delete(id); }
    }

    // Render Links
    svgLayer.innerHTML = ''; 
    appState.links.forEach(link => {
        let n1 = appState.nodes.find(n => n.id === link.sourceNode);
        let n2 = appState.nodes.find(n => n.id === link.targetNode);
        if (!n1 || !n2) return;

        let p1 = COMPONENT_TYPES[n1.type].ports.find(p => p.id === link.sourcePort);
        let p2 = COMPONENT_TYPES[n2.type].ports.find(p => p.id === link.targetPort);

        let el1 = domNodes.get(n1.id); let el2 = domNodes.get(n2.id);
        let x1 = n1.x + p1.x * (el1 ? el1.offsetWidth : 180); let y1 = n1.y + p1.y * (el1 ? el1.offsetHeight : 100);
        let x2 = n2.x + p2.x * (el2 ? el2.offsetWidth : 180); let y2 = n2.y + p2.y * (el2 ? el2.offsetHeight : 100);

        let p1_pressure = physicsPorts[link.sourceNode + '_' + link.sourcePort]?.pressure || 0;
        let p2_pressure = physicsPorts[link.targetNode + '_' + link.targetPort]?.pressure || 0;

        drawSvgLink(link.id, x1, y1, x2, y2, p1, p2, link._flow || 0, selection.type === 'link' && selection.id === link.id, p1_pressure, p2_pressure);
    });

    if (linkState.isLinking) {
        let n1 = appState.nodes.find(n => n.id === linkState.sourceNode);
        let p1 = COMPONENT_TYPES[n1.type].ports.find(p => p.id === linkState.sourcePort);
        let el1 = domNodes.get(n1.id);
        let x1 = n1.x + p1.x * el1.offsetWidth; let y1 = n1.y + p1.y * el1.offsetHeight;
        drawSvgLink('temp', x1, y1, linkState.tempX, linkState.tempY, p1, {x:0.5, y:0.5}, 0, false, 0, 0);
    }

    drawTelemetry();
}

function getPortNormal(p) {
    if (p.x <= 0.1) return {x: -1, y: 0};
    if (p.x >= 0.9) return {x: 1, y: 0};
    if (p.y <= 0.1) return {x: 0, y: -1};
    if (p.y >= 0.9) return {x: 0, y: 1};
    return {x: 0, y: 1};
}

function drawSvgLink(id, x1, y1, x2, y2, p1, p2, flow, isSelected, p1_pressure, p2_pressure) {
    const svgLayer = document.getElementById('svg-layer');
    
    let n1 = getPortNormal(p1);
    let n2 = getPortNormal(p2);
    let dist = Math.hypot(x2 - x1, y2 - y1);
    let offset = Math.max(dist * 0.4, 40);
    
    let cp1x = x1 + n1.x * offset; let cp1y = y1 + n1.y * offset;
    let cp2x = x2 + n2.x * offset; let cp2y = y2 + n2.y * offset;
    
    let d = `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`;
    
    let g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    let path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d); path.setAttribute('class', 'link-path');
    if (isSelected) path.style.stroke = 'var(--accent-hover)';
    if (id !== 'temp') path.addEventListener('mousedown', (e) => { e.stopPropagation(); selectItem('link', id); });
    g.appendChild(path);

    if (appState.simRunning && Math.abs(flow) > 0.1 && id !== 'temp') {
        let animPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        animPath.setAttribute('d', d); animPath.setAttribute('class', 'link-anim');
        let speed = Math.min(Math.abs(flow) * 0.5, 20);
        let dir = flow > 0 ? -1 : 1;
        animPath.style.strokeDashoffset = (performance.now() / 50 * speed * dir) % 20;
        g.appendChild(animPath);
    }

    if (id !== 'temp') {
        let midX = 0.125*x1 + 0.375*cp1x + 0.375*cp2x + 0.125*x2;
        let midY = 0.125*y1 + 0.375*cp1y + 0.375*cp2y + 0.125*y2;
        let text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', midX); text.setAttribute('y', midY);
        text.setAttribute('class', 'link-label');
        let avgP = Math.max(p1_pressure, p2_pressure);
        text.textContent = `${Math.abs(flow).toFixed(1)} L/min | ${Math.round(avgP)} bar`;
        g.appendChild(text);
    }

    svgLayer.appendChild(g);
}

// --- INTERACTION & UI ---
function setupEventListeners() {
    const canvas = document.getElementById('canvas');

    canvas.addEventListener('dragover', e => e.preventDefault());
    canvas.addEventListener('drop', e => {
        e.preventDefault();
        const type = e.dataTransfer.getData('text/plain');
        if (COMPONENT_TYPES[type]) {
            const rect = canvas.getBoundingClientRect();
            let x = (e.clientX - rect.left - camera.x) / camera.zoom - 90;
            let y = (e.clientY - rect.top - camera.y) / camera.zoom - 30;
            addNode(type, x, y);
        }
    });

    canvas.addEventListener('mousedown', e => {
        if (e.button === 1 || (e.button === 0 && e.target === canvas)) {
            isPanning = true;
            const rect = canvas.getBoundingClientRect();
            panStart = { x: e.clientX - rect.left - camera.x, y: e.clientY - rect.top - camera.y };
        } else if (e.target === canvas || e.target.id === 'svg-layer') {
            selectItem(null, null);
        }
    });

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        if (isPanning) {
            camera.x = e.clientX - rect.left - panStart.x;
            camera.y = e.clientY - rect.top - panStart.y;
            updateCamera();
            return;
        }
        let mouseX = (e.clientX - rect.left - camera.x) / camera.zoom;
        let mouseY = (e.clientY - rect.top - camera.y) / camera.zoom;

        if (dragState.isDragging && dragState.node) {
            dragState.node.x = mouseX - dragState.offsetX; 
            dragState.node.y = mouseY - dragState.offsetY;
        }
        if (linkState.isLinking) { 
            linkState.tempX = mouseX; 
            linkState.tempY = mouseY; 
        }
    });

    canvas.addEventListener('mouseup', () => { isPanning = false; dragState.isDragging = false; linkState.isLinking = false; });
    canvas.addEventListener('mouseleave', () => { isPanning = false; dragState.isDragging = false; linkState.isLinking = false; });

    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        let zoomAmount = e.deltaY > 0 ? 0.9 : 1.1;
        let newZoom = clamp(camera.zoom * zoomAmount, 0.2, 5);
        
        const rect = canvas.getBoundingClientRect();
        let mouseX = e.clientX - rect.left;
        let mouseY = e.clientY - rect.top;
        
        camera.x = mouseX - (mouseX - camera.x) * (newZoom / camera.zoom);
        camera.y = mouseY - (mouseY - camera.y) * (newZoom / camera.zoom);
        camera.zoom = newZoom;
        
        updateCamera();
    });

    window.addEventListener('keydown', e => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
            if (document.activeElement.tagName === 'INPUT') return;
            window.deleteSelected();
        }
    });

    document.getElementById('btn-toggle-sim').addEventListener('click', (e) => {
        appState.simRunning = !appState.simRunning;
        e.target.innerText = appState.simRunning ? "Stop Simulation" : "Start Simulation";
        e.target.style.backgroundColor = appState.simRunning ? "var(--danger)" : "var(--accent)";
    });

    document.getElementById('btn-export').addEventListener('click', () => {
        let exportData = {
            nodes: appState.nodes.map(n => ({ id: n.id, type: n.type, x: n.x, y: n.y, params: n.params, state: n.state })),
            links: appState.links.map(l => ({ id: l.id, sourceNode: l.sourceNode, sourcePort: l.sourcePort, targetNode: l.targetNode, targetPort: l.targetPort, params: l.params }))
        };
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' }));
        a.download = 'hydrosim_export.json'; a.click();
    });

    document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-import').click());
    document.getElementById('file-import').addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                appState.nodes = data.nodes || []; appState.links = data.links || [];
                domNodes.clear(); document.getElementById('world').querySelectorAll('.node').forEach(n => n.remove());
                selectItem(null, null);
            } catch (err) { alert("Invalid JSON file."); }
        };
        reader.readAsText(file);
    });

    document.getElementById('btn-theme').addEventListener('click', () => {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
}

function updateCamera() {
    document.getElementById('world').style.transform = `translate(${camera.x}px, ${camera.y}px) scale(${camera.zoom})`;
    const canvas = document.getElementById('canvas');
    canvas.style.backgroundPosition = `${camera.x}px ${camera.y}px`;
    canvas.style.backgroundSize = `${20 * camera.zoom}px ${20 * camera.zoom}px`;
}

function addNode(type, x, y) {
    let def = COMPONENT_TYPES[type];
    let node = {
        id: generateId(), type: type, x: x, y: y,
        params: JSON.parse(JSON.stringify(def.params)),
        state: JSON.parse(JSON.stringify(def.state))
    };
    appState.nodes.push(node);
    selectItem('node', node.id);
}

function startDrag(e, node) {
    dragState.isDragging = true; dragState.node = node;
    const rect = document.getElementById('canvas').getBoundingClientRect();
    let mouseX = (e.clientX - rect.left - camera.x) / camera.zoom;
    let mouseY = (e.clientY - rect.top - camera.y) / camera.zoom;
    dragState.offsetX = mouseX - node.x;
    dragState.offsetY = mouseY - node.y;
}

function startLink(nodeId, portId, e) {
    linkState.isLinking = true; linkState.sourceNode = nodeId; linkState.sourcePort = portId;
    const rect = document.getElementById('canvas').getBoundingClientRect();
    linkState.tempX = (e.clientX - rect.left - camera.x) / camera.zoom;
    linkState.tempY = (e.clientY - rect.top - camera.y) / camera.zoom;
}

function finishLink(targetNodeId, targetPortId) {
    if (!linkState.isLinking || linkState.sourceNode === targetNodeId) return;
    let exists = appState.links.find(l => 
        (l.sourceNode === linkState.sourceNode && l.sourcePort === linkState.sourcePort && l.targetNode === targetNodeId && l.targetPort === targetPortId) ||
        (l.targetNode === linkState.sourceNode && l.targetPort === linkState.sourcePort && l.sourceNode === targetNodeId && l.sourcePort === targetPortId)
    );
    if (!exists) {
        let link = {
            id: generateId(),
            sourceNode: linkState.sourceNode, sourcePort: linkState.sourcePort,
            targetNode: targetNodeId, targetPort: targetPortId,
            params: { length: 10, diameter: 25 } // Heavy machinery default hose
        };
        appState.links.push(link);
        selectItem('link', link.id);
    }
    linkState.isLinking = false;
}

function selectItem(type, id) {
    selection = { type, id };
    updatePropertiesPanel();
}

window.deleteSelected = function() {
    if (selection.type === 'node') {
        appState.nodes = appState.nodes.filter(n => n.id !== selection.id);
        appState.links = appState.links.filter(l => l.sourceNode !== selection.id && l.targetNode !== selection.id);
    } else if (selection.type === 'link') {
        appState.links = appState.links.filter(l => l.id !== selection.id);
    }
    selectItem(null, null);
};

window.updateValve = function(nodeId, val) {
    let node = appState.nodes.find(n => n.id === nodeId);
    if (node) node.state.slider = parseInt(val);
};

window.refillTank = function(nodeId) {
    let node = appState.nodes.find(n => n.id === nodeId);
    if (node) node.params.level = Math.min(node.params.capacity, node.params.level + 50);
};

function updatePropertiesPanel() {
    const panel = document.getElementById('properties-panel');
    if (!selection.type) {
        panel.innerHTML = '<div class="empty-props">Select a node or link to edit properties.</div>';
        return;
    }

    let item = selection.type === 'node' ? appState.nodes.find(n => n.id === selection.id) : appState.links.find(l => l.id === selection.id);
    if(!item) return;
    
    let title = selection.type === 'node' ? COMPONENT_TYPES[item.type].name : "Hose / Pipe";
    let html = `<div style="font-weight:bold; margin-bottom:15px; color:var(--accent)">${title}</div>`;
    
    for (let key in item.params) {
        html += `
            <div class="prop-group">
                <label>${key}</label>
                <input type="number" step="any" id="prop-${key}" value="${item.params[key]}">
            </div>
        `;
    }
    html += `<button class="danger" style="width:100%; margin-top:20px;" onclick="window.deleteSelected()">Delete ${selection.type}</button>`;
    panel.innerHTML = html;

    for (let key in item.params) {
        document.getElementById(`prop-${key}`).addEventListener('change', (e) => {
            item.params[key] = parseFloat(e.target.value) || 0;
            if (selection.type === 'node') {
                let el = domNodes.get(item.id);
                if(el) el.querySelector('.node-body').innerHTML = COMPONENT_TYPES[item.type].renderUI(item);
            }
        });
    }
}

// --- MAIN LOOP ---
function mainLoop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1; 
    lastTime = timestamp;

    stepPhysics(dt);
    render();

    requestAnimationFrame(mainLoop);
}

init();

</script>
</body>
</html>
